name: Refresh shared config lockfile

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  refresh:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'agent/upgrade-shared-configs'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout upgrade branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          persist-credentials: true

      - name: Setup PNPM
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          package-manager-cache: false

      - name: Refresh lockfile
        run: pnpm install --no-frozen-lockfile

      - name: Validate upgraded toolchain
        run: |
          pnpm lint
          pnpm typecheck
          pnpm typecheck:build
          pnpm test:coverage
          pnpm build
          pnpm publint
          pnpm package:smoke
          pnpm docs:build

      - name: Remove generated artifacts and workflow
        run: |
          rm -f \
            docs/.vitepress/config.d.ts \
            docs/.vitepress/config.js \
            docs/.vitepress/theme/index.d.ts \
            docs/.vitepress/theme/index.js \
            docs/vite.config.d.ts \
            docs/vite.config.js \
            packages/pkg-placeholder/src/index.d.ts \
            packages/pkg-placeholder/src/index.js \
            packages/pkg-placeholder/tests/some.test.d.ts \
            packages/pkg-placeholder/tests/some.test.js \
            scripts/init-template.d.ts \
            scripts/init-template.js \
            scripts/newpkg.d.ts \
            scripts/newpkg.js \
            scripts/publish-packages.d.ts \
            scripts/publish-packages.js \
            scripts/release.d.ts \
            scripts/release.js \
            scripts/release.test.d.ts \
            scripts/release.test.js \
            scripts/template.d.ts \
            scripts/template.js \
            scripts/template.test.d.ts \
            scripts/template.test.js \
            scripts/validate-packages.d.ts \
            scripts/validate-packages.js \
            .github/workflows/refresh-shared-config-lockfile.yml

      - name: Commit lockfile
        env:
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml .github/workflows/refresh-shared-config-lockfile.yml
          git diff --cached --check
          git commit -m "chore: align lockfile with Node 22 declarations"
          git push origin "HEAD:${HEAD_BRANCH}"
