name: Apply review fixes

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: apply-review-fixes-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apply:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout pull request branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          persist-credentials: true

      - name: Setup PNPM
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply reviewed Node support corrections
        run: |
          node <<'NODE'
          const fs = require('node:fs')

          const packagePath = 'package.json'
          const packageJson = JSON.parse(fs.readFileSync(packagePath, 'utf8'))
          packageJson.engines.node = '>=24'
          fs.writeFileSync(packagePath, `${JSON.stringify(packageJson, null, '\t')}\n`)

          const replacements = new Map([
            ['README.md', [
              ['Node.js 22.14.0 or newer for repository tooling', 'Node.js 24 or newer for repository tooling'],
            ]],
            ['AGENTS.md', [
              ['Requires Node >=22.14.0 and pnpm 10.34.4', 'Requires Node >=24 and pnpm 10.34.4'],
              ['CI runs build and tests on Node 22 and 24 across Ubuntu, Windows, and macOS', 'CI runs build and tests on Node 24 across Ubuntu, Windows, and macOS'],
            ]],
            ['scripts/template.ts', [
              ['Requires Node >=22.14.0 and pnpm 10.34.4', 'Requires Node >=24 and pnpm 10.34.4'],
              ['Node.js 22.14.0 or newer for repository tooling', 'Node.js 24 or newer for repository tooling'],
            ]],
            ['.github/workflows/ci.yml', [
              ['node: [22, 24]', 'node: [24]'],
            ]],
          ])

          for (const [file, pairs] of replacements) {
            let content = fs.readFileSync(file, 'utf8')
            for (const [from, to] of pairs) {
              if (!content.includes(from))
                throw new Error(`Expected text not found in ${file}: ${from}`)
              content = content.replace(from, to)
            }
            fs.writeFileSync(file, content)
          }
          NODE
          pnpm exec eslint --fix package.json README.md AGENTS.md scripts/template.ts .github/workflows/ci.yml
          rm .github/workflows/apply-review-fixes.yml

      - name: Commit review fixes
        env:
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json README.md AGENTS.md scripts/template.ts .github/workflows/ci.yml .github/workflows/apply-review-fixes.yml
          git diff --cached --check
          git commit -m "fix: align tooling support with Node 24 dependencies"
          git push origin "HEAD:${HEAD_BRANCH}"
