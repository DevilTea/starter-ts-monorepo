name: Upgrade shared configs

on:
  push:
    branches:
      - agent/upgrade-shared-configs

permissions:
  contents: write

concurrency:
  group: upgrade-shared-configs
  cancel-in-progress: true

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout upgrade branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: agent/upgrade-shared-configs
          persist-credentials: true

      - name: Setup PNPM
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install current dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply migration
        run: node scripts/upgrade-shared-configs.cjs

      - name: Remove one-time migration helpers
        run: |
          rm scripts/upgrade-shared-configs.cjs
          rm .github/workflows/upgrade-shared-configs.yml

      - name: Install upgraded dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Apply ESLint 9 fixes
        run: pnpm lint:fix

      - name: Validate migration
        run: |
          pnpm lint
          pnpm typecheck
          pnpm typecheck:build
          pnpm test:coverage
          pnpm build
          pnpm publint
          pnpm package:smoke
          pnpm docs:build

      - name: Commit migration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "chore: upgrade shared ESLint and TypeScript configs"
          git push origin HEAD:agent/upgrade-shared-configs
