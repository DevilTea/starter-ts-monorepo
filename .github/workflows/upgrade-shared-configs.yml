name: Upgrade shared configs

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: upgrade-shared-configs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  migrate:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'agent/upgrade-shared-configs'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout upgrade branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          persist-credentials: true

      - name: Setup PNPM
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install current dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply migration
        id: migration
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          node scripts/upgrade-shared-configs.cjs 2>&1 | tee migration.log

      - name: Upload migration diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: shared-config-migration-diagnostics
          path: migration.log
          retention-days: 1

      - name: Stop after migration failure
        if: steps.migration.outcome == 'failure'
        run: exit 1

      - name: Remove one-time migration helpers
        run: |
          rm scripts/upgrade-shared-configs.cjs
          rm .github/workflows/upgrade-shared-configs.yml

      - name: Install upgraded dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Apply ESLint 9 fixes
        run: pnpm lint:fix

      - name: Lint
        run: pnpm lint

      - name: Typecheck workspaces
        run: pnpm typecheck

      - name: Typecheck project references
        run: pnpm typecheck:build

      - name: Test with coverage
        run: pnpm test:coverage

      - name: Build packages
        run: pnpm build

      - name: Validate publish artifacts
        run: pnpm publint

      - name: Validate package consumers
        run: pnpm package:smoke

      - name: Build documentation
        run: pnpm docs:build

      - name: Commit migration
        env:
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "chore: upgrade shared ESLint and TypeScript configs"
          git push origin "HEAD:${HEAD_BRANCH}"
