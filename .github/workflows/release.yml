name: Release

on:
  workflow_run:
    workflows:
      - Prepare Release
    types:
      - completed

  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to publish or recover (for example v1.2.3)
        required: true
        type: string

permissions:
  actions: read
  contents: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  publish:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: release

    steps:
      - name: Resolve release tag
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          MANUAL_TAG: ${{ inputs.tag }}
          SOURCE_RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${MANUAL_TAG}"
            commit=""
          else
            mkdir -p .release
            gh run download "${SOURCE_RUN_ID}" --name release-metadata --dir .release
            tag="$(node -p "JSON.parse(require('node:fs').readFileSync('.release/release-metadata.json', 'utf8')).tag")"
            commit="$(node -p "JSON.parse(require('node:fs').readFileSync('.release/release-metadata.json', 'utf8')).commit")"
          fi

          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release tag: ${tag}" >&2
            exit 1
          fi

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "commit=${commit}" >> "${GITHUB_OUTPUT}"

      - name: Checkout immutable release tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ steps.release.outputs.tag }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify release identity
        env:
          EXPECTED_COMMIT: ${{ steps.release.outputs.commit }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          commit="$(git rev-parse HEAD)"
          if [[ -n "${EXPECTED_COMMIT}" && "${commit}" != "${EXPECTED_COMMIT}" ]]; then
            echo "Release metadata expected ${EXPECTED_COMMIT}, but tag resolves to ${commit}." >&2
            exit 1
          fi

          if ! git tag --points-at HEAD | grep -Fx "${RELEASE_TAG}" >/dev/null; then
            echo "${RELEASE_TAG} does not point at checked-out commit ${commit}." >&2
            exit 1
          fi

          git fetch --no-tags origin main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor HEAD refs/remotes/origin/main; then
            echo "${RELEASE_TAG} is not part of the main branch history." >&2
            exit 1
          fi

          version="$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version")"
          if [[ "v${version}" != "${RELEASE_TAG}" ]]; then
            echo "Root version ${version} does not match ${RELEASE_TAG}." >&2
            exit 1
          fi

      - name: Setup PNPM
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node for npm trusted publishing
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Verify trusted publishing prerequisites
        run: |
          node -e "const [major, minor, patch] = process.versions.node.split('.').map(Number); if ([major, minor, patch].join('.') !== process.versions.node || major < 22 || (major === 22 && minor < 14)) process.exit(1)"
          node -e "const version = process.argv[1].split('.').map(Number); const minimum = [11, 5, 1]; for (let index = 0; index < minimum.length; index += 1) { if (version[index] > minimum[index]) process.exit(0); if (version[index] < minimum[index]) process.exit(1) }" "$(npm --version)"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate immutable release
        run: |
          pnpm lint
          pnpm typecheck
          pnpm typecheck:build
          pnpm test:coverage
          pnpm build
          pnpm publint
          pnpm package:smoke
          pnpm docs:build

      - name: Publish missing npm package versions
        run: pnpm publish:packages

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "GitHub release ${RELEASE_TAG} already exists; leaving it unchanged."
          else
            gh release create "${RELEASE_TAG}" --verify-tag --generate-notes --fail-on-no-commits
          fi
