name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: Type of version bump
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  prepare:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup PNPM
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate release candidate
        run: |
          pnpm lint
          pnpm typecheck
          pnpm typecheck:build
          pnpm test:coverage
          pnpm build
          pnpm publint
          pnpm package:smoke
          pnpm docs:build

      - name: Create and push version commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          pnpm exec bumpp -r "${{ inputs.bump_type }}" -y

      - name: Record immutable release metadata
        run: |
          mapfile -t tags < <(git tag --points-at HEAD --list 'v*')
          if [[ "${#tags[@]}" -ne 1 ]]; then
            echo "Expected exactly one v* tag at HEAD; found ${#tags[@]}." >&2
            exit 1
          fi

          tag="${tags[0]}"
          commit="$(git rev-parse HEAD)"
          remote_commit="$(git ls-remote origin "refs/tags/${tag}^{}" | awk '{ print $1 }')"
          if [[ -z "${remote_commit}" ]]; then
            remote_commit="$(git ls-remote origin "refs/tags/${tag}" | awk '{ print $1 }')"
          fi
          if [[ "${remote_commit}" != "${commit}" ]]; then
            echo "Remote tag ${tag} does not resolve to release commit ${commit}." >&2
            exit 1
          fi

          mkdir -p .release
          node -e "require('node:fs').writeFileSync('.release/release-metadata.json', JSON.stringify({ tag: process.argv[1], commit: process.argv[2] }, null, 2) + '\n')" "${tag}" "${commit}"

      - name: Upload release metadata
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-metadata
          path: .release/release-metadata.json
          if-no-files-found: error
          retention-days: 7
