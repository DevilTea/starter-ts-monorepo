name: CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  diagnose-project-references:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout pull request branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          persist-credentials: true

      - name: Setup PNPM
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply reviewed corrections
        run: node scripts/apply-review-fixes.cjs

      - name: Remove temporary review helpers
        run: |
          rm -f scripts/apply-review-fixes.cjs
          rm -f .github/workflows/apply-review-fixes.yml
          rm -f .github/apply-review-fixes.trigger

      - name: Format corrected files
        run: pnpm exec eslint --fix package.json README.md AGENTS.md scripts/init-template.ts scripts/newpkg.ts scripts/template.ts scripts/template.test.ts packages/pkg-placeholder/tsconfig.package.json

      - name: Lint
        run: pnpm lint

      - name: Typecheck workspaces
        run: pnpm typecheck

      - name: Capture project-reference diagnostics
        id: typecheck
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          pnpm typecheck:build 2>&1 | tee typecheck-build.log

      - name: Upload project-reference diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: project-reference-diagnostics
          path: typecheck-build.log
          retention-days: 1

      - name: Stop after failed project-reference typecheck
        if: steps.typecheck.outcome == 'failure'
        run: exit 1
