name: Bug report
description: Report a reproducible defect in a published package or the starter tooling
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Search existing issues first. Do not report security vulnerabilities here; follow SECURITY.md.
  - type: input
    id: package
    attributes:
      label: Package or component
      description: Name the affected npm package, script, workflow, or documentation area.
      placeholder: "@scope/package or pnpm init:template"
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: "1.2.3 or commit SHA"
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Provide exact steps, a repository, or a focused code sample.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Include Node.js, pnpm, operating system, and relevant TypeScript or bundler versions.
      placeholder: "Node 24.x, pnpm 10.x, macOS"
    validations:
      required: true
