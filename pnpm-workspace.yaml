# Supply-chain security baseline (see DevilTea/hub templates/pnpm-security.md)
minimumReleaseAge: 4320
minimumReleaseAgeExclude:
  - '@deviltea/eslint-config'
  - '@deviltea/tsconfig'
blockExoticSubdeps: true
strictDepBuilds: true
shellEmulator: true
trustPolicy: no-downgrade
packages:
  - docs
  - packages/*

catalog:
  '@clack/prompts': ^0.11.0
  '@deviltea/eslint-config': 9.0.0
  '@deviltea/tsconfig': 1.0.0
  '@shikijs/vitepress-twoslash': ^3.23.0
  '@types/node': ^24.3.0
  '@vitest/coverage-v8': ^4.1.9
  bumpp: ^10.4.1
  eslint: ^10.5.0
  lint-staged: ^16.4.0
  publint: ^0.3.21
  simple-git-hooks: ^2.13.1
  tsdown: ^0.19.0
  tsx: ^4.22.5
  typescript: ^6.0.3
  vite: ^7.3.6
  vitepress: 2.0.0-alpha.17
  vitepress-plugin-group-icons: ^1.7.5
  vitest: ^4.1.9
  vue: ^3.5.39
  vue-tsc: ^3.3.6

ignoredBuiltDependencies:
  - esbuild
  - simple-git-hooks
onlyBuiltDependencies: []
